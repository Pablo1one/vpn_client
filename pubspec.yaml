name: vpn_client
description: VPN client — Windows, Android, iOS
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    # sing-box binary for Windows — download from GitHub releases and place here.
    # https://github.com/SagerNet/sing-box/releases → sing-box_*_windows_amd64.zip
    - assets/bin/sing-box.exe
    - assets/bin/wintun.dll
