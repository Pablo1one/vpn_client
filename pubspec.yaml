name: vpn_client
description: VPN client — Windows, Android, iOS
publish_to: none
version: 1.0.12+13

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  http: ^1.2.0
  tray_manager: ^0.5.0
  window_manager: ^0.4.0
  package_info_plus: ^8.1.0
  url_launcher: ^6.3.0
  file_picker: ^8.1.7
  country_flags: ^3.0.0
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

# иконка LightningMcQueen для Android (молния): foreground с отступом + белый фон
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "tool/android_legacy.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "tool/android_fg.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    # sing-box binary for Windows — download from GitHub releases and place here.
    # https://github.com/SagerNet/sing-box/releases → sing-box_*_windows_amd64.zip
    - assets/bin/sing-box.exe
    - assets/bin/xray.exe
    - assets/bin/amneziawg.exe
    - assets/bin/awg.exe
    - assets/bin/wintun.dll
    - assets/icons/tray.ico
    - assets/data/iplist_ru.txt
    - assets/data/allowed_ips_bypass.txt
    - assets/data/geosite-ads.srs
